apiVersion: apps/v1
kind: Deployment
metadata:
  name: escape-the-castle
  namespace: escape-the-castle
  labels:
    app: escape-the-castle
spec:
  replicas: 1
  selector:
    matchLabels:
      app: escape-the-castle
  template:
    metadata:
      labels:
        app: escape-the-castle
    spec:
      securityContext:
        fsGroup: 1000
      volumes:
        - name: castle-data
          persistentVolumeClaim:
            claimName: castle-db
      containers:
        - name: castle
          image: quay.io/gshanmug-quay/escape-the-castle:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: CASTLE_DB_PATH
              value: /data/castle.db
          volumeMounts:
            - name: castle-data
              mountPath: /data
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          startupProbe:
            httpGet:
              path: /api/rooms
              port: 8000
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /api/rooms
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/rooms
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
