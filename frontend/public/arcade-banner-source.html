<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Crimson+Text:ital,wght@0,400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 480px;
      height: 270px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0d12;
      background-image:
        radial-gradient(ellipse 70% 60% at 50% 50%, transparent 0%, rgba(0, 0, 0, 0.4) 100%),
        radial-gradient(ellipse 80% 50% at 50% 0%, #2d2438 0%, transparent 50%);
      position: relative;
    }
    /* Secondary softer glow - behind card */
    .torchGlowSoft {
      position: absolute;
      top: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 180px;
      z-index: 0;
      background: radial-gradient(ellipse 90% 100% at 50% 0%, rgba(212, 175, 55, 0.08) 0%, rgba(212, 175, 55, 0.03) 50%, transparent 75%);
      pointer-events: none;
    }
    /* Torch glow / spotlight above castle - reduced for castle visibility */
    .torchGlow {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 280px;
      height: 100px;
      z-index: 2;
      background: radial-gradient(ellipse 80% 100% at 50% 0%, rgba(212, 175, 55, 0.22) 0%, rgba(212, 175, 55, 0.1) 35%, rgba(212, 175, 55, 0.03) 60%, transparent 75%);
      pointer-events: none;
    }
    .card {
      width: 440px;
      height: 230px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #1d1920 0%, #1a161e 50%, #161318 100%);
      border: 3px double rgba(212, 175, 55, 0.55);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow:
        0 0 0 1px rgba(212, 175, 55, 0.25) inset,
        0 1px 0 rgba(212, 175, 55, 0.15) inset,
        0 8px 32px rgba(0, 0, 0, 0.5),
        0 0 48px rgba(212, 175, 55, 0.08);
      position: relative;
      z-index: 1;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 8px;
      left: 8px;
      right: 8px;
      bottom: 8px;
      border: 1px solid rgba(212, 175, 55, 0.22);
      border-radius: 12px;
      pointer-events: none;
    }
    .cornerFlourish {
      position: absolute;
      width: 24px;
      height: 24px;
      pointer-events: none;
      opacity: 0.5;
    }
    .cornerFlourish svg {
      width: 100%;
      height: 100%;
      stroke: rgba(212, 175, 55, 0.8);
      fill: none;
      stroke-width: 1.5;
    }
    .cornerFlourish.tl { top: 12px; left: 12px; }
    .cornerFlourish.tr { top: 12px; right: 12px; transform: scaleX(-1); }
    .cornerFlourish.bl { bottom: 12px; left: 12px; transform: scaleY(-1); }
    .cornerFlourish.br { bottom: 12px; right: 12px; transform: scale(-1); }
    .badge {
      font-family: 'Cinzel', Georgia, serif;
      font-size: 0.65rem;
      font-variant: small-caps;
      letter-spacing: 0.2em;
      color: rgba(212, 175, 55, 0.85);
      padding: 0.2rem 0.6rem;
      border: 1px solid rgba(212, 175, 55, 0.4);
      border-radius: 4px;
      margin-bottom: 0.5rem;
      position: relative;
      z-index: 1;
    }
    .crown {
      font-size: 3rem;
      line-height: 1;
      margin-bottom: 0.35rem;
      position: relative;
      z-index: 1;
      transform: perspective(200px) rotateX(-8deg) rotateY(5deg);
      filter: drop-shadow(2px 2px 0 rgba(0, 0, 0, 0.4)) drop-shadow(4px 4px 0 rgba(0, 0, 0, 0.25)) drop-shadow(6px 6px 0 rgba(0, 0, 0, 0.15));
    }
    .title {
      font-family: 'Cinzel', Georgia, serif;
      font-weight: 700;
      font-size: 1.9rem;
      letter-spacing: 0.06em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #d4af37;
      text-shadow: 0 0 20px rgba(212, 175, 55, 0.35), 0 1px 2px rgba(0, 0, 0, 0.5);
      margin-bottom: 0.4rem;
      position: relative;
      z-index: 1;
    }
    .title::after {
      content: '';
      display: block;
      width: 80px;
      height: 2px;
      margin: 0.35rem auto 0;
      background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.6), transparent);
    }
    .subtitle {
      font-family: 'Crimson Text', Georgia, serif;
      font-size: 1.1rem;
      font-variant: small-caps;
      letter-spacing: 0.04em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #7a7268;
      text-align: center;
      position: relative;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="torchGlowSoft" aria-hidden="true"></div>
  <div class="torchGlow" aria-hidden="true"></div>
  <div class="card">
    <div class="cornerFlourish tl" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M2 2v8h8" stroke="rgba(212,175,55,0.8)" fill="none" stroke-width="1.5"/></svg></div>
    <div class="cornerFlourish tr" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M2 2v8h8" stroke="rgba(212,175,55,0.8)" fill="none" stroke-width="1.5"/></svg></div>
    <div class="cornerFlourish bl" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M2 2v8h8" stroke="rgba(212,175,55,0.8)" fill="none" stroke-width="1.5"/></svg></div>
    <div class="cornerFlourish br" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M2 2v8h8" stroke="rgba(212,175,55,0.8)" fill="none" stroke-width="1.5"/></svg></div>
    <span class="badge">Puzzle Game</span>
    <span class="crown">🏰</span>
    <h1 class="title">Escape the Castle</h1>
    <p class="subtitle">Enter the castle — solve its puzzles — escape or perish</p>
  </div>
</body>
</html>
